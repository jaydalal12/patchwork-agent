name: CI

# Runs the test suite on every push and PR. No API keys required — the suite
# (unit + scripted-LLM integration) is designed to pass without a provider key,
# so CI exercises the real registry, sandbox, git, and pytest end to end.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Configure git identity (sandbox commits need one)
        run: |
          git config --global user.email "ci@patchwork.local"
          git config --global user.name "patchwork-ci"

      - name: Install
        run: pip install -e ".[dev]"

      - name: Tests + coverage
        run: pytest -q --cov=patchwork --cov-report=term-missing
